<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一樣是健人</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap');

:root{
  --bg:#0D0221;
  --panel:#150330;
  --panel2:#1F0A45;
  --pink:#FF2A6D;
  --cyan:#05D9E8;
  --text:#F2E9FF;
  --muted:#8B7AB0;
  --good:#05D9E8;
  --ok:#FFD23F;
  --bad:#FF2A6D;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden}
body{
  background-image:
    linear-gradient(rgba(5,217,232,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,42,109,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.screen{position:fixed;inset:0;display:none;flex-direction:column;padding:20px}
.screen.active{display:flex}

/* 共用 */
h1.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(28px,7vw,64px);
  letter-spacing:2px;line-height:1;text-align:center;
  background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,42,109,.5))}
.sub{font-family:'Orbitron';text-align:center;color:var(--cyan);letter-spacing:6px;font-size:clamp(10px,2.5vw,14px);margin-top:6px;opacity:.8}
.btn{font-family:'Noto Sans TC';font-weight:900;font-size:18px;border:none;border-radius:14px;padding:16px 28px;cursor:pointer;
  background:linear-gradient(135deg,var(--pink),#c01050);color:#fff;letter-spacing:1px;
  box-shadow:0 0 24px rgba(255,42,109,.45);transition:transform .12s,box-shadow .12s}
.btn:active{transform:scale(.96)}
.btn.cyan{background:linear-gradient(135deg,var(--cyan),#039bb0);box-shadow:0 0 24px rgba(5,217,232,.45);color:#04121a}
.btn.ghost{background:transparent;border:2px solid var(--muted);box-shadow:none;color:var(--text)}
.input{width:100%;background:var(--panel);border:2px solid var(--panel2);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'Noto Sans TC';margin-top:10px}
.input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 14px rgba(5,217,232,.3)}

/* 開始頁 */
#startScreen{justify-content:center;align-items:center;gap:8px}
.card{background:rgba(21,3,48,.85);border:1px solid var(--panel2);border-radius:20px;padding:28px;width:min(420px,92vw);margin-top:24px}
.card .label{color:var(--muted);font-size:13px;font-weight:700;letter-spacing:1px}
.hint{color:var(--muted);font-size:13px;line-height:1.6;text-align:center;margin-top:18px}

/* 倒數 */
#readyScreen{justify-content:center;align-items:center}
#countNum{font-family:'Orbitron';font-weight:900;font-size:30vh;line-height:1;color:var(--cyan);text-shadow:0 0 60px rgba(5,217,232,.7)}
#readyName{font-family:'Orbitron';color:var(--pink);letter-spacing:4px;margin-bottom:10px;font-size:clamp(16px,4vw,28px)}

/* 遊戲頁 */
#gameScreen{padding:14px;flex-direction:row;gap:14px}
.camWrap{position:relative;flex:1.7;border-radius:18px;overflow:hidden;border:2px solid var(--panel2);background:#000;min-width:0}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#overlay{position:absolute;inset:0;width:100%;height:100%}
.camTag{position:absolute;top:12px;left:12px;z-index:5;background:rgba(13,2,33,.7);border:1px solid var(--pink);border-radius:30px;padding:8px 16px;font-weight:900;font-size:clamp(16px,2.4vw,24px);backdrop-filter:blur(4px)}
.camTag .emoji{margin-right:6px}
#camMsg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;text-align:center;
  background:rgba(13,2,33,.78);color:var(--ok);font-weight:700;font-size:clamp(15px,2.6vw,22px);padding:20px;line-height:1.6}
#flash{position:absolute;inset:0;z-index:4;opacity:0;pointer-events:none}
.panel{flex:1;display:flex;flex-direction:column;gap:12px;min-width:230px;max-width:38vw}

/* 計數器(招牌元件) */
.counter{position:relative;background:var(--panel);border:1px solid var(--panel2);border-radius:18px;padding:16px;text-align:center;flex-shrink:0}
.counter svg{width:100%;max-width:220px;display:block;margin:0 auto}
.counter .ring-bg{fill:none;stroke:var(--panel2);stroke-width:10}
.counter .ring-fg{fill:none;stroke:var(--cyan);stroke-width:10;stroke-linecap:round;filter:drop-shadow(0 0 6px var(--cyan));transition:stroke-dashoffset .25s}
.counter .num{font-family:'Orbitron';font-weight:900;font-size:clamp(40px,9vw,84px);fill:var(--text)}
.counter .target{font-family:'Orbitron';font-size:18px;fill:var(--muted)}
.counter.pulse{animation:pulse .35s ease}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}

.quality{text-align:center;font-family:'Orbitron';font-weight:900;font-size:clamp(22px,5vw,40px);letter-spacing:2px;min-height:1.2em;transition:opacity .2s}
.quality.good{color:var(--good);text-shadow:0 0 18px var(--good)}
.quality.ok{color:var(--ok);text-shadow:0 0 18px var(--ok)}
.quality.bad{color:var(--bad);text-shadow:0 0 18px var(--bad)}

/* 示範影片 */
.demo{background:var(--panel);border:1px solid var(--panel2);border-radius:16px;overflow:hidden;flex-shrink:0}
.demo .head{padding:8px 14px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px}
.demo video{width:100%;display:block;background:#000;max-height:22vh}
.demo .placeholder{height:14vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--cyan);font-weight:700;font-size:14px;padding:10px;line-height:1.5}

/* 自製示範動畫(火柴人模板,之後可換 Seedance 影片) */
.demoBox{display:flex;align-items:center;justify-content:center;height:18vh;background:radial-gradient(circle at 50% 38%,rgba(5,217,232,.08),transparent 70%)}
.demoBox video{width:100%;height:100%;object-fit:contain;background:#000;border-radius:8px}
.fig{height:100%;max-height:18vh;width:auto}
.fig line{stroke-width:5;stroke-linecap:round}
.fig .torso,.fig .leg{stroke:var(--cyan);filter:drop-shadow(0 0 4px var(--cyan))}
.fig .arm{stroke:var(--pink);filter:drop-shadow(0 0 4px var(--pink))}
.fig .head{fill:var(--pink);filter:drop-shadow(0 0 5px var(--pink))}
.fig .arm,.fig .legL,.fig .legR,.fig .upper{transform-box:view-box}
.fig .arm{transform-origin:50px 40px}
.fig .legL,.fig .legR{transform-origin:50px 78px}
.fig .upper{transform-origin:50px 55px}
.ex-squat .upper{animation:sqUp 1.4s ease-in-out infinite}
.ex-squat .legL{animation:sqLL 1.4s ease-in-out infinite}
.ex-squat .legR{animation:sqLR 1.4s ease-in-out infinite}
@keyframes sqUp{0%,100%{transform:translateY(0)}50%{transform:translateY(14px)}}
@keyframes sqLL{0%,100%{transform:rotate(0)}50%{transform:rotate(-12deg)}}
@keyframes sqLR{0%,100%{transform:rotate(0)}50%{transform:rotate(12deg)}}
.ex-jumpingjack .armL{animation:jjA 1s ease-in-out infinite}
.ex-jumpingjack .armR{animation:jjB 1s ease-in-out infinite}
.ex-jumpingjack .legL{animation:jjLL 1s ease-in-out infinite}
.ex-jumpingjack .legR{animation:jjLR 1s ease-in-out infinite}
@keyframes jjA{0%,100%{transform:rotate(0)}50%{transform:rotate(150deg)}}
@keyframes jjB{0%,100%{transform:rotate(0)}50%{transform:rotate(-150deg)}}
@keyframes jjLL{0%,100%{transform:rotate(0)}50%{transform:rotate(-16deg)}}
@keyframes jjLR{0%,100%{transform:rotate(0)}50%{transform:rotate(16deg)}}
.ex-armraise .armL{animation:arA 1.4s ease-in-out infinite}
.ex-armraise .armR{animation:arB 1.4s ease-in-out infinite}
@keyframes arA{0%,100%{transform:rotate(0)}50%{transform:rotate(140deg)}}
@keyframes arB{0%,100%{transform:rotate(0)}50%{transform:rotate(-140deg)}}
.ex-kneeraise .legL{animation:knL 2s ease-in-out infinite}
.ex-kneeraise .legR{animation:knR 2s ease-in-out infinite}
@keyframes knL{0%,40%,100%{transform:rotate(0)}20%{transform:rotate(42deg)}}
@keyframes knR{0%,60%,100%{transform:rotate(0)}80%{transform:rotate(-42deg)}}
.ex-lunge .legL{animation:luL 1.6s ease-in-out infinite}
.ex-lunge .legR{animation:luR 1.6s ease-in-out infinite}
.ex-lunge .upper{animation:luUp 1.6s ease-in-out infinite}
@keyframes luL{0%,100%{transform:rotate(0)}50%{transform:rotate(34deg)}}
@keyframes luR{0%,100%{transform:rotate(0)}50%{transform:rotate(-12deg)}}
@keyframes luUp{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@media (prefers-reduced-motion:reduce){ .fig *{animation:none!important} }

/* 星星爆發動畫 */
.star-p{
  position:fixed;pointer-events:none;z-index:200;
  transform-origin:center center;
  animation:starBurst var(--dur,0.75s) ease-out forwards;
  will-change:transform,opacity;
  line-height:1;
}
@keyframes starBurst{
  0%{transform:translate(-50%,-50%) translate(0,0) scale(1) rotate(0deg);opacity:1}
  60%{opacity:1}
  100%{transform:translate(-50%,-50%) translate(var(--sx),var(--sy)) scale(0.15) rotate(var(--rot));opacity:0}
}
@media (prefers-reduced-motion:reduce){.star-p{display:none}}

/* 任務列表 */
.tasks{background:var(--panel);border:1px solid var(--panel2);border-radius:16px;padding:14px;flex:1;overflow-y:auto}
.tasks .t{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.05);font-weight:700}
.tasks .t:last-child{border:none}
.tasks .t.done{color:var(--cyan)}
.tasks .t .c{font-family:'Orbitron';font-size:14px;color:var(--muted)}
.tasks .t.done .c{color:var(--cyan)}
.scoreRow{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border-radius:12px;padding:10px 16px;font-weight:900;flex-shrink:0}
.scoreRow .v{font-family:'Orbitron';color:var(--cyan);font-size:22px}

/* 結算 */
#resultScreen{justify-content:center;align-items:center;gap:14px}
#rating{font-family:'Orbitron';font-weight:900;font-size:28vh;line-height:.9}
#rating.S{color:#FFD23F;text-shadow:0 0 50px #FFD23F}
#rating.A{color:var(--cyan);text-shadow:0 0 50px var(--cyan)}
#rating.B{color:var(--pink);text-shadow:0 0 40px var(--pink)}
#rating.C{color:var(--muted)}
.statline{display:flex;gap:24px;font-family:'Orbitron'}
.statline .s{text-align:center}
.statline .s .n{font-size:clamp(24px,5vw,40px);color:var(--text)}
.statline .s .l{font-size:11px;color:var(--muted);letter-spacing:1px}
.lb{background:var(--panel);border:1px solid var(--panel2);border-radius:16px;padding:14px 18px;width:min(440px,92vw);max-height:30vh;overflow-y:auto}
.lb h3{font-family:'Orbitron';color:var(--cyan);font-size:14px;letter-spacing:2px;margin-bottom:8px}
.lb .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-weight:700;font-size:14px}
.lb .row .rk{font-family:'Orbitron';color:var(--pink);width:28px}
.lb .row .nm{flex:1;padding:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb .row .sc{font-family:'Orbitron';color:var(--cyan)}
.btnRow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

.toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:700;margin-top:14px;cursor:pointer;user-select:none}
.toggle .box{width:42px;height:24px;border-radius:14px;background:var(--panel2);position:relative;transition:background .2s}
.toggle .box::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--muted);top:3px;left:3px;transition:.2s}
.toggle.on .box{background:var(--cyan)}
.toggle.on .box::after{left:21px;background:#04121a}

@media (orientation:portrait) and (max-width:820px){
  #gameScreen{flex-direction:column}
  .panel{max-width:none;min-width:0}
  .rotateHint{display:block}
}
.rotateHint{display:none;position:fixed;bottom:10px;left:0;right:0;text-align:center;color:var(--ok);font-size:12px;z-index:50}

/* 模式選擇 */
.modeRow{display:flex;gap:10px;margin-top:16px}
.modeBtn{flex:1;font-family:'Noto Sans TC';font-weight:700;font-size:14px;padding:12px 6px;border-radius:12px;border:2px solid var(--panel2);background:var(--panel);color:var(--muted);cursor:pointer;transition:.2s;letter-spacing:.5px}
.modeBtn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(5,217,232,.09);box-shadow:0 0 14px rgba(5,217,232,.25)}

/* 足球守門員遊戲頁 */
#soccerScreen{padding:0}
#soccerScreen .camWrap{flex:1;border-radius:0;border:none}
#sVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#sCanvas{position:absolute;inset:0;width:100%;height:100%}
#sCamMsg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:6;text-align:center;background:rgba(13,2,33,.78);color:var(--ok);font-weight:700;font-size:clamp(15px,2.6vw,22px);padding:20px;line-height:1.6}
#sHUD{position:fixed;top:0;left:0;right:0;z-index:30;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(rgba(13,2,33,.88),transparent)}
#sScoreDisplay{font-family:'Orbitron';font-weight:900;font-size:clamp(18px,4vw,34px);letter-spacing:2px}
#sScoreDisplay .sv{color:var(--cyan);text-shadow:0 0 10px var(--cyan)}
#sScoreDisplay .gl{color:var(--pink);text-shadow:0 0 10px var(--pink)}
#sBallNum{font-family:'Orbitron';font-size:13px;color:var(--muted);letter-spacing:1px}
#sResultMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:35;pointer-events:none;font-family:'Orbitron';font-weight:900;font-size:clamp(52px,15vw,130px);opacity:0;transition:opacity .1s;white-space:nowrap}
#sResultMsg.save{color:var(--cyan);text-shadow:0 0 40px var(--cyan),0 0 80px rgba(5,217,232,.4)}
#sResultMsg.goal{color:var(--pink);text-shadow:0 0 40px var(--pink),0 0 80px rgba(255,42,109,.4)}

/* 足球結算頁 */
#soccerResultScreen{justify-content:center;align-items:center;gap:20px}
#sWinLose{font-family:'Orbitron';font-weight:900;font-size:clamp(42px,12vw,92px)}
#sWinLose.win{color:#FFD23F;text-shadow:0 0 50px #FFD23F}
#sWinLose.lose{color:var(--pink);text-shadow:0 0 40px var(--pink)}
#sWinLose.draw{color:var(--muted)}
.sStatline{font-family:'Orbitron';font-size:clamp(20px,4vw,36px);letter-spacing:2px}
.sStatline .sv2{color:var(--cyan)}
.sStatline .gl2{color:var(--pink)}

/* ── 接水模式 ── */
#waterScreen{padding:0}
#waterScreen .camWrap{flex:1;border-radius:0;border:none}
#wVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#wCanvas{position:absolute;inset:0;width:100%;height:100%}
#wCamMsg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:6;background:rgba(13,2,33,.78);color:var(--ok);font-weight:700;font-size:clamp(15px,2.6vw,22px);text-align:center;padding:20px;line-height:1.6}
#wHUD{position:fixed;top:0;left:0;right:0;z-index:30;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(rgba(13,2,33,.88),transparent)}
#wHUD .hw{display:flex;flex-direction:column;align-items:center}
#wHUD .hl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:2px}
#wClean{font-family:'Orbitron';font-size:clamp(15px,3.2vw,26px);color:var(--cyan);font-weight:900;text-shadow:0 0 8px var(--cyan)}
#wDirty{font-family:'Orbitron';font-size:clamp(15px,3.2vw,26px);color:var(--pink);font-weight:900;text-shadow:0 0 8px var(--pink)}
#wDropLeft{font-family:'Orbitron';font-size:12px;color:var(--muted);text-align:center;letter-spacing:1px}
#wPollMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;text-align:center;pointer-events:none;opacity:0;transition:opacity .1s;width:90vw}
#wPollMsg .pm1{font-family:'Orbitron';font-weight:900;font-size:clamp(20px,5.5vw,50px);color:var(--pink);text-shadow:0 0 30px var(--pink),0 0 60px rgba(255,42,109,.35)}
#wPollMsg .pm2{font-family:'Noto Sans TC';font-size:clamp(12px,2.5vw,18px);color:var(--ok);margin-top:8px;font-weight:700}
#wPurifyMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:41;text-align:center;pointer-events:none;opacity:0;transition:opacity .1s;width:90vw}
#wPurifyMsg .pu1{font-family:'Orbitron';font-weight:900;font-size:clamp(22px,6vw,54px);color:var(--cyan);text-shadow:0 0 30px var(--cyan),0 0 60px rgba(5,217,232,.4)}
#wPurifyMsg .pu2{font-family:'Noto Sans TC';font-size:clamp(13px,2.5vw,18px);color:#fff;margin-top:8px;font-weight:700}
#waterResultScreen{justify-content:center;align-items:center;gap:20px}
#wWinLose{font-family:'Orbitron';font-weight:900;font-size:clamp(40px,11vw,86px)}
#wWinLose.win{color:#FFD23F;text-shadow:0 0 50px #FFD23F}
#wWinLose.lose{color:var(--pink);text-shadow:0 0 40px var(--pink)}
.wStat{font-family:'Orbitron';font-size:clamp(14px,3vw,24px);color:var(--muted);letter-spacing:1px}
.wStat .wc{color:var(--cyan)}
.wStat .wd{color:var(--pink)}
</style>
</head>
<body>

<!-- 開始頁 -->
<section id="startScreen" class="screen active">
  <h1 class="logo">一樣是健人</h1>
  <div class="sub">MOTION FITNESS</div>
  <div class="card">
    <div class="label">玩家名稱</div>
    <input id="inName" class="input" placeholder="輸入暱稱" maxlength="12">
    <div class="label" style="margin-top:14px">手機號碼</div>
    <input id="inPhone" class="input" placeholder="0900000000" inputmode="numeric" maxlength="10">
    <div class="modeRow">
      <button id="btnModeFitness" class="modeBtn active">🏋️ 健身模式</button>
      <button id="btnModeSoccer" class="modeBtn">⚽ 守門員模式</button>
      <button id="btnModeWater" class="modeBtn">💧 接水模式</button>
    </div>
    <button id="btnStart" class="btn cyan" style="width:100%;margin-top:16px">開始挑戰</button>
    <div id="voiceToggle" class="toggle on"><div class="box"></div>語音報數</div>
  </div>
  <div class="hint">需要相機權限・建議裝置架在約 2 公尺外拍到全身<br>橫向、光線充足效果最好</div>
</section>

<!-- 倒數頁 -->
<section id="readyScreen" class="screen">
  <div id="readyName">準備</div>
  <div id="countNum">3</div>
</section>

<!-- 遊戲頁 -->
<section id="gameScreen" class="screen">
  <div class="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="camTag"><span class="emoji" id="exEmoji">🏋️</span><span id="exName">深蹲</span></div>
    <div id="flash"></div>
    <div id="camMsg">啟動相機中…</div>
  </div>
  <div class="panel">
    <div class="counter" id="counter">
      <svg viewBox="0 0 240 240">
        <circle class="ring-bg" cx="120" cy="120" r="100"></circle>
        <circle class="ring-fg" id="ring" cx="120" cy="120" r="100" transform="rotate(-90 120 120)"></circle>
        <text class="num" id="repNum" x="120" y="120" text-anchor="middle" dominant-baseline="central">0</text>
        <text class="target" id="repTarget" x="120" y="170" text-anchor="middle">/ 0</text>
      </svg>
    </div>
    <div class="quality" id="quality">&nbsp;</div>
    <div class="demo">
      <div class="head">動作示範</div>
      <div id="demoBox" class="demoBox"></div>
    </div>
    <div class="tasks" id="tasks"></div>
    <div class="scoreRow"><span id="levelName">第一關</span><span>分數 <span class="v" id="score">0</span></span></div>
  </div>
  <div class="rotateHint">↻ 建議橫向擺放</div>
</section>

<!-- 結算頁 -->
<section id="resultScreen" class="screen">
  <div id="rating" class="C">C</div>
  <div class="statline">
    <div class="s"><div class="n" id="rScore">0</div><div class="l">SCORE</div></div>
    <div class="s"><div class="n" id="rReps">0</div><div class="l">REPS</div></div>
    <div class="s"><div class="n" id="rAcc">0%</div><div class="l">標準率</div></div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

/* ===================== 設定區(部署後填這裡) ===================== */
const JR = {
  // Supabase(排行榜)。填入 anon key 後排行榜才會上傳/讀取;留空則只顯示本機分數
  supabaseUrl: 'https://hhcubvixldieuwdeqnwc.supabase.co',
  supabaseAnonKey: '',
  // Seedance 預生成示範影片網址(每個動作一支;留空則顯示文字提示)
  demoVideos: {
    squat: '',
    jumpingjack: '',
    kneeraise: '',
    lunge: '',
    armraise: ''
  }
};
/* ============================================================== */

// 身體節點索引(MediaPipe 33 點)
const LM = {
  nose:0, lSh:11, rSh:12, lEl:13, rEl:14, lWr:15, rWr:16,
  lHip:23, rHip:24, lKn:25, rKn:26, lAn:27, rAn:28
};

function angle(a,b,c){
  const abx=a.x-b.x, aby=a.y-b.y, cbx=c.x-b.x, cby=c.y-b.y;
  const dot=abx*cbx+aby*cby;
  const mag=Math.hypot(abx,aby)*Math.hypot(cbx,cby);
  if(mag===0) return 180;
  return Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
}
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

// 動作定義:每個都有 process(lm) -> {rep,quality,progress}
const EXERCISES = {
  squat:{
    name:'深蹲', emoji:'🏋️',
    reset(){ this.phase='up'; this.minA=180; },
    process(p){
      const a=(angle(p[LM.lHip],p[LM.lKn],p[LM.lAn])+angle(p[LM.rHip],p[LM.rKn],p[LM.rAn]))/2;
      let rep=false, quality=null;
      this.minA=Math.min(this.minA,a);
      if(this.phase==='up' && a<110){ this.phase='down'; this.minA=a; }
      else if(this.phase==='down' && a>150){
        this.phase='up'; rep=true;
        quality=this.minA<=95?'good':this.minA<=118?'ok':'bad';
        this.minA=180;
      }
      const progress=Math.max(0,Math.min(1,(170-a)/(170-90)));
      return {rep,quality,progress};
    }
  },
  jumpingjack:{
    name:'開合跳', emoji:'🤸',
    reset(){ this.phase='closed'; this.opened=false; },
    process(p){
      const shW=dist(p[LM.lSh],p[LM.rSh])||0.1;
      const ankW=Math.abs(p[LM.lAn].x-p[LM.rAn].x);
      const armsUp=(p[LM.lWr].y<p[LM.lSh].y)&&(p[LM.rWr].y<p[LM.rSh].y);
      const legsApart=ankW>shW*1.6;
      const open=armsUp&&legsApart;
      let rep=false, quality=null;
      if(this.phase==='closed' && open){ this.phase='open'; this.opened=true; }
      else if(this.phase==='open' && !armsUp && !legsApart){
        this.phase='closed'; rep=true;
        const full=(p[LM.lWr].y<p[LM.nose].y)&&(p[LM.rWr].y<p[LM.nose].y);
        quality=full?'good':(ankW>shW*1.4?'ok':'bad');
      }
      const progress=open?1:Math.min(1,ankW/(shW*1.6));
      return {rep,quality,progress};
    }
  },
  kneeraise:{
    name:'原地抬膝', emoji:'🦵',
    reset(){ this.up=false; },
    process(p){
      const hipY=(p[LM.lHip].y+p[LM.rHip].y)/2;
      const kneeUp=(p[LM.lKn].y<hipY-0.02)||(p[LM.rKn].y<hipY-0.02);
      const highest=Math.min(p[LM.lKn].y,p[LM.rKn].y);
      let rep=false, quality=null;
      if(!this.up && kneeUp){
        this.up=true; rep=true;
        quality=highest<hipY-0.06?'good':highest<hipY?'ok':'bad';
      } else if(this.up && !kneeUp){ this.up=false; }
      const progress=Math.max(0,Math.min(1,(hipY-highest+0.05)/0.15));
      return {rep,quality,progress};
    }
  },
  lunge:{
    name:'弓箭步', emoji:'🏃',
    reset(){ this.phase='up'; this.minA=180; },
    process(p){
      const la=angle(p[LM.lHip],p[LM.lKn],p[LM.lAn]);
      const ra=angle(p[LM.rHip],p[LM.rKn],p[LM.rAn]);
      const minA=Math.min(la,ra), maxA=Math.max(la,ra);
      let rep=false, quality=null;
      this.minA=Math.min(this.minA,minA);
      if(this.phase==='up' && minA<115 && maxA>140){ this.phase='down'; this.minA=minA; }
      else if(this.phase==='down' && minA>150){
        this.phase='up'; rep=true;
        quality=this.minA<=100?'good':this.minA<=120?'ok':'bad';
        this.minA=180;
      }
      const progress=Math.max(0,Math.min(1,(170-minA)/(170-90)));
      return {rep,quality,progress};
    }
  },
  armraise:{
    name:'手臂上舉', emoji:'🙆',
    reset(){ this.up=false; },
    process(p){
      const up=(p[LM.lWr].y<p[LM.nose].y)&&(p[LM.rWr].y<p[LM.nose].y);
      const down=(p[LM.lWr].y>p[LM.lSh].y)&&(p[LM.rWr].y>p[LM.rSh].y);
      let rep=false, quality=null;
      if(!this.up && up){
        this.up=true; rep=true;
        const high=(p[LM.lWr].y<p[LM.nose].y-0.08)&&(p[LM.rWr].y<p[LM.nose].y-0.08);
        quality=high?'good':'ok';
      } else if(this.up && down){ this.up=false; }
      const shY=(p[LM.lSh].y+p[LM.rSh].y)/2;
      const wrY=(p[LM.lWr].y+p[LM.rWr].y)/2;
      const progress=Math.max(0,Math.min(1,(shY-wrY+0.1)/0.3));
      return {rep,quality,progress};
    }
  }
};

// 關卡:每關一組動作目標
const LEVELS=[
  { name:'第一關・熱身', tasks:[{ex:'squat',target:8},{ex:'jumpingjack',target:12}] },
  { name:'第二關・核心', tasks:[{ex:'kneeraise',target:16},{ex:'squat',target:12}] },
  { name:'第三關・全身', tasks:[{ex:'lunge',target:8},{ex:'jumpingjack',target:16},{ex:'armraise',target:12}] }
];

// 連線到單一關卡的所有任務,串成一條序列
function buildSequence(level){
  const seq=[];
  level.tasks.forEach(t=>seq.push({ex:t.ex,target:t.target,count:0,quality:{good:0,ok:0,bad:0}}));
  return seq;
}

/* ---------------- 狀態 ---------------- */
const state={
  player:{name:'',phone:''},
  voice:true,
  mode:'fitness',
  levelIdx:0,
  seq:[], taskIdx:0,
  score:0, totalReps:0, goodReps:0,
  running:false
};

/* ---------------- 音效(Web Audio) ---------------- */
let actx=null;
function audio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function beep(freq,dur,type='sine',vol=0.2){
  try{
    const c=audio(), o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start(); o.stop(c.currentTime+dur);
  }catch(e){}
}
function sfxGood(){ beep(880,0.12,'triangle'); setTimeout(()=>beep(1320,0.12,'triangle'),60); }
function sfxOk(){ beep(660,0.12,'sine'); }
function sfxBad(){ beep(180,0.18,'sawtooth',0.15); }
function sfxLevel(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle'),i*120)); }
function speak(text){
  if(!state.voice||!('speechSynthesis' in window)) return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='zh-TW'; u.rate=1.15; speechSynthesis.speak(u); }catch(e){}
}

/* ---------------- 畫面切換 ---------------- */
const screens={start:'startScreen',ready:'readyScreen',game:'gameScreen',result:'resultScreen',soccer:'soccerScreen',soccerResult:'soccerResultScreen',water:'waterScreen',waterResult:'waterResultScreen'};
function show(name){
  Object.values(screens).forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(screens[name]).classList.add('active');
}

/* ---------------- MediaPipe ---------------- */
let landmarker=null, video=null, canvas=null, ctx=null, rafId=null, lastTs=-1;
const SKELETON=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];

async function initLandmarker(){
  const fileset=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
  landmarker=await PoseLandmarker.createFromOptions(fileset,{
    baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate:"GPU" },
    runningMode:"VIDEO", numPoses:1
  });
}

async function startCamera(){
  video=document.getElementById('video');
  canvas=document.getElementById('overlay');
  ctx=canvas.getContext('2d');
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720},audio:false});
  video.srcObject=stream;
  await video.play();
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
}

function bodyVisible(lm){
  const keys=[LM.lSh,LM.rSh,LM.lHip,LM.rHip,LM.lKn,LM.rKn,LM.lAn,LM.rAn];
  let v=0; keys.forEach(k=>v+=(lm[k].visibility||0));
  return v/keys.length>0.5;
}

function drawSkeleton(lm){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(canvas.width,0); ctx.scale(-1,1); // 鏡像對齊畫面
  ctx.lineWidth=4; ctx.strokeStyle='#05D9E8'; ctx.shadowColor='#05D9E8'; ctx.shadowBlur=8;
  SKELETON.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(lm[a].x*canvas.width,lm[a].y*canvas.height);
    ctx.lineTo(lm[b].x*canvas.width,lm[b].y*canvas.height);
    ctx.stroke();
  });
  ctx.fillStyle='#FF2A6D'; ctx.shadowColor='#FF2A6D';
  lm.forEach((pt,i)=>{ if(i>10){ ctx.beginPath(); ctx.arc(pt.x*canvas.width,pt.y*canvas.height,6,0,Math.PI*2); ctx.fill(); } });
  ctx.restore();
}

/* ---------------- 遊戲迴圈 ---------------- */
function currentTask(){ return state.seq[state.taskIdx]; }

function loop(){
  rafId=requestAnimationFrame(loop);
  if(!landmarker||!video||video.readyState<2) return;
  const ts=performance.now();
  if(ts===lastTs) return; lastTs=ts;
  const res=landmarker.detectForVideo(video,ts);
  if(!res.landmarks||res.landmarks.length===0){ setCamMsg('看不到人・請站到鏡頭前'); return; }
  const lm=res.landmarks[0];
  drawSkeleton(lm);
  if(!bodyVisible(lm)){ setCamMsg('請站遠一點・讓鏡頭拍到全身'); return; }
  setCamMsg('');
  if(state.running) drawBalloon(lm);

  const task=currentTask(); if(!task||!state.running) return;
  const ex=EXERCISES[task.ex];
  const out=ex.process(lm);
  setRing(out.progress);
  if(out.rep){ onRep(task,out.quality); }
}

function spawnStars(quality){
  const cfg={good:{color:'#05D9E8',count:14,size:[18,28]},ok:{color:'#FFD23F',count:9,size:[14,22]},bad:{color:'#FF2A6D',count:6,size:[12,18]}};
  const {color,count,size}=cfg[quality]||cfg.bad;
  const counterEl=document.getElementById('counter');
  const r=counterEl.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const chars=['★','✦','✧','⭐','💫'];
  for(let i=0;i<count;i++){
    const el=document.createElement('span');
    el.className='star-p';
    const angle=(i/count)*Math.PI*2+(Math.random()-0.5)*0.6;
    const dist=90+Math.random()*110;
    const sx=Math.cos(angle)*dist, sy=Math.sin(angle)*dist;
    const fs=size[0]+Math.random()*(size[1]-size[0]);
    const dur=0.55+Math.random()*0.35;
    const rot=(Math.random()*720-360)+'deg';
    el.style.cssText=[
      'left:'+cx+'px','top:'+cy+'px',
      'font-size:'+fs+'px','color:'+color,
      'text-shadow:0 0 8px '+color,
      '--sx:'+sx+'px','--sy:'+sy+'px',
      '--dur:'+dur+'s','--rot:'+rot,
      'animation-delay:'+(Math.random()*0.08)+'s'
    ].join(';');
    el.textContent=chars[Math.floor(Math.random()*chars.length)];
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove(),{once:true});
  }
}

/* ---------------- 氣球 ---------------- */
const BLN_COLORS=['#FF6B6B','#FF9F43','#FECA57','#26de81','#45aaf2','#fd79a8','#a29bfe','#00cec9'];
const bln={r:42,nextR:42,step:18,maxR:190,pop:false,popT:0,col:0};

function resetBalloon(){ bln.r=42; bln.nextR=42; bln.pop=false; bln.col=0; }

function sfxPop(){
  beep(700,0.03,'square',0.22);
  setTimeout(()=>beep(350,0.07,'sawtooth',0.12),22);
}

function balloonPop(){
  if(bln.pop) return;
  bln.pop=true; bln.popT=performance.now();
  bln.nextR=Math.min(bln.r+bln.step,bln.maxR);
  bln.col=(bln.col+1)%BLN_COLORS.length;
  sfxPop();
}

function drawBalloon(lm){
  const POP=420;
  let drawR=bln.r, alpha=1, isPopping=bln.pop;
  if(bln.pop){
    const t=Math.min(1,(performance.now()-bln.popT)/POP);
    if(t>=1){ bln.pop=false; bln.r=bln.nextR; isPopping=false; drawR=bln.r; }
    else{ drawR=bln.r*(1+t*0.9); alpha=1-t; isPopping=true; }
  }
  const nose=lm[LM.nose];
  const lSh=lm[LM.lSh], rSh=lm[LM.rSh];
  const cx=((lSh.x+rSh.x)/2)*canvas.width;
  const cy=Math.max(drawR+8, nose.y*canvas.height-drawR-12);
  const wobble=isPopping?0:Math.sin(performance.now()/380)*4;
  const color=BLN_COLORS[bln.col%BLN_COLORS.length];
  ctx.save();
  ctx.translate(canvas.width,0); ctx.scale(-1,1);
  ctx.globalAlpha=alpha;
  if(isPopping){
    // 爆炸射線
    ctx.lineWidth=3; ctx.shadowBlur=0;
    for(let i=0;i<12;i++){
      const ang=(i/12)*Math.PI*2;
      const r1=drawR*0.55, r2=drawR*1.35;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ang)*r1,cy+Math.sin(ang)*r1);
      ctx.lineTo(cx+Math.cos(ang)*r2,cy+Math.sin(ang)*r2);
      ctx.strokeStyle=color; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(cx,cy,drawR,0,Math.PI*2);
    ctx.fillStyle=color+'55'; ctx.fill();
  } else {
    // 陰影
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(cx+6,cy+6,drawR,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
    // 氣球主體
    ctx.shadowColor=color; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(cx+wobble,cy+wobble*0.3,drawR,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.shadowBlur=0;
    // 亮點
    ctx.beginPath(); ctx.arc(cx-drawR*0.3+wobble,cy-drawR*0.3,drawR*0.18,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.58)'; ctx.fill();
    // 小亮點
    ctx.beginPath(); ctx.arc(cx-drawR*0.1+wobble,cy-drawR*0.5,drawR*0.07,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();
    // 打結
    ctx.beginPath(); ctx.arc(cx+wobble,cy+drawR+5,5,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    // 細線
    ctx.beginPath();
    ctx.moveTo(cx+wobble,cy+drawR+10);
    ctx.bezierCurveTo(cx+wobble+14,cy+drawR+30,cx-10,cy+drawR+48,cx,cy+drawR+64);
    ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function onRep(task,quality){
  task.count++; state.totalReps++;
  task.quality[quality]++;
  if(quality==='good'){ state.score+=100; state.goodReps++; sfxGood(); flash('#05D9E8'); }
  else if(quality==='ok'){ state.score+=60; sfxOk(); flash('#FFD23F'); }
  else { state.score+=20; sfxBad(); flash('#FF2A6D'); }
  speak(String(task.count));
  showQuality(quality);
  spawnStars(quality);
  balloonPop();
  updateHUD();
  document.getElementById('counter').classList.remove('pulse'); void document.getElementById('counter').offsetWidth;
  document.getElementById('counter').classList.add('pulse');
  if(task.count>=task.target) nextTask();
}

function nextTask(){
  state.taskIdx++;
  if(state.taskIdx>=state.seq.length){ finishLevel(); return; }
  sfxLevel();
  loadTaskUI();
}

function finishLevel(){
  state.running=false;
  cancelAnimationFrame(rafId);
  if(video&&video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); }
  const acc=state.totalReps?Math.round(state.goodReps/state.totalReps*100):0;
  let rating='C';
  if(acc>=85&&state.score>=2000) rating='S';
  else if(acc>=70) rating='A';
  else if(acc>=50) rating='B';
  document.getElementById('rScore').textContent=state.score;
  document.getElementById('rReps').textContent=state.totalReps;
  document.getElementById('rAcc').textContent=acc+'%';
  const r=document.getElementById('rating'); r.className=rating; r.textContent=rating;
  sfxLevel();
  show('result');
  submitScore(rating,acc).finally(loadLeaderboard);
}

/* ---------------- HUD ---------------- */
function setCamMsg(m){ const el=document.getElementById('camMsg'); el.textContent=m; el.style.display=m?'flex':'none'; }
function setRing(p){
  const r=100, circ=2*Math.PI*r;
  document.getElementById('ring').style.strokeDasharray=circ;
  document.getElementById('ring').style.strokeDashoffset=circ*(1-Math.max(0,Math.min(1,p)));
}
let qTimer=null;
function showQuality(q){
  const el=document.getElementById('quality');
  const txt={good:'標準!',ok:'普通',bad:'不標準'};
  el.className='quality '+q; el.textContent=txt[q];
  clearTimeout(qTimer); qTimer=setTimeout(()=>{ el.textContent='\u00a0'; el.className='quality'; },700);
}
function flash(color){
  const f=document.getElementById('flash');
  f.style.background='radial-gradient(circle,'+color+'55,transparent 70%)';
  f.style.transition='none'; f.style.opacity='1';
  requestAnimationFrame(()=>{ f.style.transition='opacity .4s'; f.style.opacity='0'; });
}
function updateHUD(){
  const task=currentTask();
  document.getElementById('repNum').textContent=task.count;
  document.getElementById('repTarget').textContent='/ '+task.target;
  document.getElementById('score').textContent=state.score;
  renderTasks();
}

/* ================== 足球守門員模式 ================== */
const SOCCER_ZONES=[
  [0.14,0.20],[0.50,0.14],[0.86,0.20],
  [0.08,0.54],[0.92,0.54],
  [0.18,0.82],[0.50,0.80],[0.82,0.82]
];
let sVid=null,sCvs=null,sCx=null,sRafId=null,sLastTs=-1;
const sc={total:12,shot:0,saves:0,goals:0,phase:'idle',flashTimer:null,
  ball:{sx:.5,sy:.46,ex:.5,ey:.5,t0:0,dur:2500,spin:0,saved:false,goalT:0}};

function scReset(){ sc.shot=0;sc.saves=0;sc.goals=0;sc.phase='idle'; }

function scHUD(){
  document.getElementById('sSaves').textContent=sc.saves;
  document.getElementById('sGoals').textContent=sc.goals;
  document.getElementById('sBallNum').textContent='第 '+(sc.shot+1)+' / '+sc.total+' 球';
}

function scLaunch(){
  if(sc.shot>=sc.total){ scEnd(); return; }
  const z=SOCCER_ZONES[Math.floor(Math.random()*SOCCER_ZONES.length)];
  const b=sc.ball;
  b.sx=z[0]; b.sy=z[1]; b.ex=.5; b.ey=.46;
  b.t0=performance.now(); b.dur=3000;
  b.spin=Math.random()*Math.PI*2; b.saved=false;
  sc.phase='flying';
  scHUD();
}

function scFlash(type){
  const el=document.getElementById('sResultMsg');
  el.textContent=type==='save'?'SAVE!':'GOAL!';
  el.className=type; el.style.opacity='1';
  sc.phase='flash';
  clearTimeout(sc.flashTimer);
  sc.flashTimer=setTimeout(()=>{
    el.style.opacity='0';
    sc.shot++;
    sc.phase='idle';
    if(sc.shot>=sc.total){ setTimeout(scEnd,400); return; }
    setTimeout(scLaunch,600);
  },1200);
}

function scEnd(){
  sc.phase='idle';
  cancelAnimationFrame(sRafId);
  if(sVid&&sVid.srcObject) sVid.srcObject.getTracks().forEach(t=>t.stop());
  document.getElementById('sFinalSaves').textContent=sc.saves;
  document.getElementById('sFinalGoals').textContent=sc.goals;
  const wl=document.getElementById('sWinLose');
  if(sc.saves>sc.goals){ wl.textContent='勝利!'; wl.className='win'; }
  else if(sc.saves<sc.goals){ wl.textContent='失敗'; wl.className='lose'; }
  else { wl.textContent='平手'; wl.className='draw'; }
  sfxLevel();
  show('soccerResult');
}

function drawSoccerBall(cx,cy,r,spin){
  sCx.save();
  sCx.translate(cx,cy);
  sCx.scale(-1,1);   // 抵消外層鏡像，讓 emoji 方向正確
  sCx.rotate(spin);
  sCx.shadowColor='rgba(0,0,0,0.55)';
  sCx.shadowBlur=r*0.5;
  sCx.shadowOffsetX=r*0.06;
  sCx.shadowOffsetY=r*0.1;
  sCx.font=Math.round(r*2.1)+'px serif';
  sCx.textAlign='center';
  sCx.textBaseline='middle';
  sCx.fillText('⚽',0,0);
  sCx.restore();
}

function drawGoal(){
  const W=sCvs.width, H=sCvs.height;
  const gL=W*0.12, gR=W*0.88, gT=H*0.05, gB=H*0.84;
  const gW=gR-gL, gH=gB-gT;
  // Net grid
  sCx.save();
  sCx.globalAlpha=0.16; sCx.strokeStyle='#ffffff'; sCx.lineWidth=1;
  const cols=18, rows=13;
  for(let i=0;i<=cols;i++){
    const x=gL+gW*i/cols;
    sCx.beginPath(); sCx.moveTo(x,gT); sCx.lineTo(x,gB); sCx.stroke();
  }
  for(let j=0;j<=rows;j++){
    const y=gT+gH*j/rows;
    sCx.beginPath(); sCx.moveTo(gL,y); sCx.lineTo(gR,y); sCx.stroke();
  }
  // Posts & crossbar
  sCx.globalAlpha=1;
  sCx.strokeStyle='#ffffff'; sCx.lineWidth=9;
  sCx.lineCap='round'; sCx.lineJoin='round';
  sCx.shadowColor='rgba(255,255,255,0.8)'; sCx.shadowBlur=14;
  sCx.beginPath();
  sCx.moveTo(gL,gB); sCx.lineTo(gL,gT); sCx.lineTo(gR,gT); sCx.lineTo(gR,gB);
  sCx.stroke();
  // Ground dashes
  sCx.shadowBlur=0; sCx.strokeStyle='rgba(255,255,255,0.35)';
  sCx.lineWidth=3; sCx.setLineDash([22,14]);
  sCx.beginPath(); sCx.moveTo(gL,gB); sCx.lineTo(gR,gB); sCx.stroke();
  sCx.setLineDash([]);
  sCx.restore();
}

function sLoop(){
  sRafId=requestAnimationFrame(sLoop);
  if(!landmarker||!sVid||sVid.readyState<2) return;
  const ts=performance.now();
  if(ts===sLastTs) return; sLastTs=ts;
  const res=landmarker.detectForVideo(sVid,ts);
  sCx.clearRect(0,0,sCvs.width,sCvs.height);
  drawGoal();
  const lm=res.landmarks&&res.landmarks[0];
  const camMsg=document.getElementById('sCamMsg');
  if(!lm){ camMsg.style.display='flex'; }
  else { camMsg.style.display='none'; }

  if(lm){
    // Faint skeleton
    sCx.save(); sCx.translate(sCvs.width,0); sCx.scale(-1,1);
    sCx.lineWidth=2; sCx.strokeStyle='rgba(5,217,232,0.3)'; sCx.shadowBlur=0;
    SKELETON.forEach(([a,b])=>{
      sCx.beginPath();
      sCx.moveTo(lm[a].x*sCvs.width,lm[a].y*sCvs.height);
      sCx.lineTo(lm[b].x*sCvs.width,lm[b].y*sCvs.height);
      sCx.stroke();
    });
    // Wrist glow rings (守門提示)
    [LM.lWr,LM.rWr].forEach(k=>{
      sCx.beginPath();
      sCx.arc(lm[k].x*sCvs.width,lm[k].y*sCvs.height,22,0,Math.PI*2);
      sCx.strokeStyle='rgba(255,42,109,0.85)'; sCx.lineWidth=3;
      sCx.shadowColor='#FF2A6D'; sCx.shadowBlur=10; sCx.stroke();
      sCx.shadowBlur=0;
    });
    sCx.restore();
  }

  // 進球旋轉動畫
  if(sc.phase==='goaling'){
    const b=sc.ball;
    const gt=Math.min(1,(performance.now()-b.goalT)/700);
    const gx=b.ex*sCvs.width, gy=b.ey*sCvs.height;
    b.spin+=0.18*(1+gt*4);              // 加速旋轉
    const gr=22*(1+Math.sin(gt*Math.PI*2)*0.28); // 脈衝縮放
    sCx.save(); sCx.translate(sCvs.width,0); sCx.scale(-1,1);
    sCx.globalAlpha=Math.max(0,1-gt*0.55);
    drawSoccerBall(gx,gy,gr,b.spin);
    sCx.globalAlpha=1;
    sCx.restore();
    if(gt>=1){ sc.goals++; scFlash('goal'); }
    return;
  }

  if(sc.phase!=='flying') return;
  const b=sc.ball;
  const t=Math.min(1,(performance.now()-b.t0)/b.dur);
  const drawR=85+(22-85)*t;   // 由大到小，最小與手腕圓圈相同(22px)
  const bx=(b.sx+(b.ex-b.sx)*t)*sCvs.width;
  const by=(b.sy+(b.ey-b.sy)*t)*sCvs.height;
  b.spin+=0.055;

  sCx.save(); sCx.translate(sCvs.width,0); sCx.scale(-1,1);
  drawSoccerBall(bx,by,drawR,b.spin);
  sCx.restore();

  // 球變小進入球門前（t<=0.88）都可攔截
  if(t<=0.88&&!b.saved&&lm){
    const hitR=Math.max(50,drawR*2.2);
    const lwx=lm[LM.lWr].x*sCvs.width, lwy=lm[LM.lWr].y*sCvs.height;
    const rwx=lm[LM.rWr].x*sCvs.width, rwy=lm[LM.rWr].y*sCvs.height;
    if(Math.hypot(lwx-bx,lwy-by)<hitR||Math.hypot(rwx-bx,rwy-by)<hitR){
      b.saved=true; sc.saves++;
      sfxGood(); scFlash('save');
    }
  }
  if(t>=1&&!b.saved){
    sc.phase='goaling'; b.goalT=performance.now(); sfxBad();
  }
}

];
let wVid=null,wCvs=null,wCx=null,wRafId=null,wLastTs=-1;
const wg={
  cleanTarget:20,dirtyMax:3,
  pool:[],poolIdx:0,
  drops:[],cleanCaught:0,dirtyCaught:0,

};

function wBuildPool(){
  const pool=[];
  for(let i=0;i<30;i++) pool.push({type:'clean'});
  for(let i=0;i<30;i++) pool.push({type:'dirty',pollIdx:i%POLLUTANTS.length});
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const p1=8+Math.floor(Math.random()*8), p2=22+Math.floor(Math.random()*8), p3=38+Math.floor(Math.random()*8);
  pool.splice(p1,0,{type:'purifier'}); pool.splice(p2+1,0,{type:'purifier'}); pool.splice(p3+2,0,{type:'purifier'});
  return pool;
}

function wDrawDrop(x,y,r,type,opacity){
  wCx.save();
  if(type==='clean'){
    const g=wCx.createRadialGradient(x-r*.25,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'rgba(180,235,255,.95)'); g.addColorStop(1,'rgba(0,160,230,.7)');
    wCx.fillStyle=g; wCx.shadowColor='#05D9E8'; wCx.shadowBlur=8;
    wCx.beginPath(); wCx.arc(x,y,r,0,Math.PI*2); wCx.fill();
    wCx.shadowBlur=0; wCx.fillStyle='rgba(255,255,255,.62)';
    wCx.beginPath(); wCx.arc(x-r*.28,y-r*.32,r*.22,0,Math.PI*2); wCx.fill();
  } else if(type==='dirty'){
    wCx.globalAlpha=opacity;
    const g=wCx.createRadialGradient(x-r*.15,y-r*.2,r*.05,x,y,r);
    g.addColorStop(0,'rgba(80,60,15,1)'); g.addColorStop(1,'rgba(15,10,3,1)');
    wCx.fillStyle=g; wCx.shadowColor='rgba(60,45,5,.6)'; wCx.shadowBlur=5;
    wCx.beginPath(); wCx.arc(x,y,r,0,Math.PI*2); wCx.fill();
    wCx.shadowBlur=0; wCx.strokeStyle='rgba(120,90,15,.35)'; wCx.lineWidth=1.5; wCx.stroke();
  } else {
    wDrawPurifierItem(x,y,r);
  }
  wCx.restore();
}

function wDrawPurifierItem(x,y,r){
  const w=r*2.2,h=r*2.8;
  wCx.shadowColor='rgba(5,217,232,.85)'; wCx.shadowBlur=16;
  wCx.fillStyle='#eef8ff'; wCx.strokeStyle='rgba(5,200,230,.9)'; wCx.lineWidth=2;
  wCx.beginPath();
  if(wCx.roundRect) wCx.roundRect(x-w/2,y-h/2,w,h,r*.3); else wCx.rect(x-w/2,y-h/2,w,h);
  wCx.fill(); wCx.stroke();
  wCx.shadowBlur=0;
  wCx.strokeStyle='rgba(5,170,210,.5)'; wCx.lineWidth=1.5;
  wCx.beginPath(); wCx.moveTo(x-w/2,y-h*.08); wCx.lineTo(x+w/2,y-h*.28); wCx.stroke();
  wCx.fillStyle='#007ab8'; wCx.font='bold '+Math.round(r*.72)+'px sans-serif';
  wCx.textAlign='center'; wCx.textBaseline='middle';
  wCx.fillText('UV',x,y-h*.15);
  wCx.fillStyle='#05aad4'; wCx.font='bold '+Math.round(r*.46)+'px sans-serif';
  wCx.fillText('eSpring',x,y+h*.22);
}

function wDrawCup(x,y,r){
  const w=r*2.6,h=r*2.0;
  const top=y-h/2,bot=y+h/2;
  const rimL=x-w/2,rimR=x+w/2,botL=x-w*.36,botR=x+w*.36;
  wCx.save();
  // Body fill
  wCx.beginPath(); wCx.moveTo(rimL,top); wCx.lineTo(botL,bot); wCx.lineTo(botR,bot); wCx.lineTo(rimR,top); wCx.closePath();
  const bf=wCx.createLinearGradient(rimL,top,rimR,top);
  bf.addColorStop(0,'rgba(5,217,232,.06)'); bf.addColorStop(.5,'rgba(5,217,232,.16)'); bf.addColorStop(1,'rgba(5,217,232,.06)');
  wCx.fillStyle=bf; wCx.fill();
  // Water fill at bottom (40%) with animated wave
  const wh=h*.42,wt=bot-wh;
  const wtL=botL+(rimL-botL)*(1-wh/h),wtR=botR+(rimR-botR)*(1-wh/h);
  const mid=(wtL+wtR)/2,wave=Math.sin(performance.now()/400)*2.5;
  wCx.beginPath(); wCx.moveTo(wtL,wt); wCx.quadraticCurveTo(mid,wt+wave,wtR,wt);
  wCx.lineTo(botR,bot); wCx.lineTo(botL,bot); wCx.closePath();
  const wf=wCx.createLinearGradient(x,wt,x,bot);
  wf.addColorStop(0,'rgba(5,217,232,.30)'); wf.addColorStop(1,'rgba(5,217,232,.58)');
  wCx.fillStyle=wf; wCx.fill();
  // Cup sides
  wCx.shadowColor='rgba(5,217,232,.65)'; wCx.shadowBlur=10;
  wCx.strokeStyle='rgba(5,217,232,.88)'; wCx.lineWidth=2.5;
  wCx.beginPath(); wCx.moveTo(rimL,top); wCx.lineTo(botL,bot); wCx.lineTo(botR,bot); wCx.lineTo(rimR,top); wCx.stroke();
  // Rim (bright glow)
  wCx.shadowBlur=16; wCx.shadowColor='rgba(5,217,232,.9)';
  wCx.strokeStyle='rgba(5,217,232,1)'; wCx.lineWidth=3.5;
  wCx.beginPath(); wCx.moveTo(rimL,top); wCx.lineTo(rimR,top); wCx.stroke();
  // Left highlight
  wCx.shadowBlur=0; wCx.strokeStyle='rgba(255,255,255,.32)'; wCx.lineWidth=1.5;
  wCx.beginPath(); wCx.moveTo(rimL+w*.1,top+4); wCx.lineTo(botL+w*.07,bot-5); wCx.stroke();
  wCx.restore();
}

function wDrawPurifierCup(x,y,r){
  const w=r*2.6,h=r*2.8;
  wCx.save();
  // Body
  wCx.shadowColor='rgba(5,217,232,.85)'; wCx.shadowBlur=18;
  wCx.fillStyle='rgba(228,248,255,.93)'; wCx.strokeStyle='rgba(5,217,232,.95)'; wCx.lineWidth=2.5;
  wCx.beginPath();
  if(wCx.roundRect) wCx.roundRect(x-w/2,y-h/2,w,h,r*.32); else wCx.rect(x-w/2,y-h/2,w,h);
  wCx.fill(); wCx.stroke();
  // Inner glow
  wCx.shadowBlur=0;
  const ig=wCx.createLinearGradient(x-w/2,y,x+w/2,y);
  ig.addColorStop(0,'rgba(5,217,232,.03)'); ig.addColorStop(.5,'rgba(5,217,232,.14)'); ig.addColorStop(1,'rgba(5,217,232,.03)');
  wCx.fillStyle=ig;
  wCx.beginPath();
  if(wCx.roundRect) wCx.roundRect(x-w/2+3,y-h/2+3,w-6,h-6,r*.26); else wCx.rect(x-w/2+3,y-h/2+3,w-6,h-6);
  wCx.fill();
  // Divider
  wCx.strokeStyle='rgba(5,170,210,.45)'; wCx.lineWidth=1.5;
  wCx.beginPath(); wCx.moveTo(x-w/2,y-h*.06); wCx.lineTo(x+w/2,y-h*.26); wCx.stroke();
  // UV label
  wCx.fillStyle='#006fa0'; wCx.font='bold '+Math.round(r*.65)+'px sans-serif';
  wCx.textAlign='center'; wCx.textBaseline='middle'; wCx.fillText('UV',x,y-h*.15);
  // eSpring label
  wCx.fillStyle='#05aad4'; wCx.font='bold '+Math.round(r*.42)+'px sans-serif';
  wCx.fillText('eSpring',x,y+h*.2);
  // Pulsing active indicator
  const pulse=0.55+Math.sin(performance.now()/280)*0.45;
  wCx.fillStyle='rgba(0,220,170,'+pulse+')';
  wCx.beginPath(); wCx.arc(x+w*.28,y-h*.28,r*.15,0,Math.PI*2); wCx.fill();
  wCx.restore();
}

function wEnd(win){
  wg.phase='ended';
  cancelAnimationFrame(wRafId);
  if(wVid&&wVid.srcObject) wVid.srcObject.getTracks().forEach(t=>t.stop());
  clearTimeout(wg.pollTimer); clearTimeout(wg.purifyTimer);
  document.getElementById('wPollMsg').style.opacity='0';
  document.getElementById('wPurifyMsg').style.opacity='0';
  const el=document.getElementById('wWinLose');
  el.textContent=win?'淨水成功!':'水質污染!'; el.className=win?'win':'lose';
  document.getElementById('wFinalClean').textContent=wg.cleanCaught;
  document.getElementById('wFinalDirty').textContent=wg.dirtyCaught;
  sfxLevel(); show('waterResult');
}

function wLoop(ts){
  wRafId=requestAnimationFrame(wLoop);
  if(!landmarker||!wVid||wVid.readyState<2) return;
  if(ts===wLastTs) return;
  const dt=wLastTs<0?16:Math.min(50,ts-wLastTs);
  wLastTs=ts;
  const res=landmarker.detectForVideo(wVid,ts);
  const W=wCvs.width,H=wCvs.height;
  wCx.clearRect(0,0,W,H);
  const lm=res.landmarks&&res.landmarks[0];
  document.getElementById('wCamMsg').style.display=lm?'none':'flex';
  if(wg.phase!=='running') return;
  const now=performance.now();
  // Spawn next drop from pool
  if(wg.poolIdx<wg.pool.length&&now-wg.lastSpawn>wg.spawnInterval){
    const tmpl=wg.pool[wg.poolIdx++];
    wg.drops.push({
      ...tmpl,
      x:(0.1+Math.random()*.8)*W,
      y:-25,
      vy:tmpl.type==='purifier'?(2.4+Math.random()*1.5)*3:(2.4+Math.random()*1.5),
      r:15+Math.random()*10,
      opacity:tmpl.type==='dirty'?(.1+Math.random()*.9):1
    });
    wg.lastSpawn=now;
  }
  // Wrist positions (mirror-compensated: 1-lm.x to match CSS scaleX(-1))
  let lwx=W*.35,lwy=H*.6,rwx=W*.65,rwy=H*.6;
  if(lm){
    lwx=(1-lm[LM.lWr].x)*W; lwy=lm[LM.lWr].y*H;
    rwx=(1-lm[LM.rWr].x)*W; rwy=lm[LM.rWr].y*H;
  }
  const cupR=26;
  // Update and draw drops (iterate backwards for safe splice)
  for(let i=wg.drops.length-1;i>=0;i--){
    const d=wg.drops[i];
    d.y+=d.vy*(dt/16.67);
    if(!d.caught){
      const hr=d.r+cupR+8;
      if(Math.hypot(d.x-lwx,d.y-lwy)<hr||Math.hypot(d.x-rwx,d.y-rwy)<hr){
        d.caught=true;
        if(d.type==='purifier'){
          wg.purified=true; wShowPurify();
        } else if(d.type==='clean'||wg.purified){
          wg.cleanCaught++;
          if(wg.cleanCaught>=wg.cleanTarget){ wUpdateHUD(); wEnd(true); return; }
        } else {
          wg.dirtyCaught++;
          wShowPoll(POLLUTANTS[d.pollIdx%POLLUTANTS.length]);
          if(wg.dirtyCaught>=wg.dirtyMax){ wUpdateHUD(); wEnd(false); return; }
        }
        wUpdateHUD(); wg.drops.splice(i,1); continue;
      }
    }
    if(d.y>H+30){
      wg.drops.splice(i,1);
      if(wg.poolIdx>=wg.pool.length&&wg.drops.length===0){ wEnd(wg.cleanCaught>=wg.cleanTarget); return; }
      continue;
    }
    wDrawDrop(d.x,d.y,d.r,d.type,d.opacity);
  }
  // Draw skeleton and cups
  if(lm){
    wCx.save();
    wCx.lineWidth=2; wCx.strokeStyle='rgba(5,217,232,.22)'; wCx.shadowBlur=0;
    SKELETON.forEach(([a,b])=>{
      wCx.beginPath();
      wCx.moveTo((1-lm[a].x)*W,lm[a].y*H);
      wCx.lineTo((1-lm[b].x)*W,lm[b].y*H);
      wCx.stroke();
    });
    wCx.restore();
    if(wg.purified){ wDrawPurifierCup(lwx,lwy,cupR); wDrawPurifierCup(rwx,rwy,cupR); }
    else { wDrawCup(lwx,lwy,cupR); wDrawCup(rwx,rwy,cupR); }
  }
}

async function startWaterGame(){
  wg.phase='idle'; wg.pool=wBuildPool(); wg.poolIdx=0;
  wg.drops=[]; wg.cleanCaught=0; wg.dirtyCaught=0;
  wg.purified=false; wg.lastSpawn=0;
  clearTimeout(wg.pollTimer); clearTimeout(wg.purifyTimer);
  show('ready');
  document.getElementById('readyName').textContent=state.player.name+'・接水準備';
  try{
    if(!landmarker){ document.getElementById('countNum').textContent='載入中'; await initLandmarker(); }
    wVid=document.getElementById('wVideo'); wCvs=document.getElementById('wCanvas');
    wCx=wCvs.getContext('2d');
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720},audio:false});
    wVid.srcObject=stream; await wVid.play();
    wCvs.width=wVid.videoWidth; wCvs.height=wVid.videoHeight;
  }catch(e){ alert('無法啟動相機:'+e.message); show('start'); return; }
  wUpdateHUD();
  let n=3; const cn=document.getElementById('countNum'); cn.textContent='3'; show('ready');
  const iv=setInterval(()=>{
    n--; beep(440,.1);
    if(n<=0){
      clearInterval(iv); cn.textContent='GO'; beep(880,.2);
      show('water'); wLastTs=-1; wg.phase='running'; wg.lastSpawn=performance.now();
      wRafId=requestAnimationFrame(wLoop);
    } else cn.textContent=n;
  },900);
}

  const name=document.getElementById('inName').value.trim();
  const phone=document.getElementById('inPhone').value.trim();
  if(!name){ alert('請輸入暱稱'); return; }
  if(!/^09\d{8}$/.test(phone)){ alert('請輸入正確手機號碼'); return; }
  state.player={name,phone};
  audio(); // 解鎖音訊
  if(state.mode==='soccer') startSoccerGame();
  else if(state.mode==='water') startWaterGame();
  else startGame();
});

});
